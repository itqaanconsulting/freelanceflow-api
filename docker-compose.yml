services:
  postgres:
    image: postgres:16-alpine
    container_name: freelanceflow-postgres
    environment:
      POSTGRES_DB: freelanceflow
      POSTGRES_USER: freelanceflow
      POSTGRES_PASSWORD: freelanceflow
    ports:
      - "5433:5432"
    volumes:
      - freelanceflow-postgres-data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: freelanceflow-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

volumes:
  freelanceflow-postgres-data:
